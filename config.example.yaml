# Arkclaw 评估配置示例
# 复制此文件为 config.yaml 并填入实际配置

arkclaw:
  # Arkclaw Response API 网关地址
  base_url: "https://your-arkclaw-gateway-url/v1"
  # Arkclaw API Key（建议使用环境变量 ARKCLAW_API_KEY 配置）
  api_key: "your-arkclaw-api-key-here"
  # 可选：模型名称，取决于实际网关配置
  model: "openclaw"
  # 单次请求超时时间（秒）
  timeout_seconds: 30


doubao:
  # 豆包 LLM Judge 网关地址
  # 建议优先通过环境变量 DOUBAO_BASE_URL 或 OPENAI_BASE_URL 配置
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  # 豆包 API Key
  # 建议优先通过环境变量 DOUBAO_API_KEY 或 OPENAI_API_KEY 配置
  api_key: "your-doubao-api-key-here"
  model: "doubao-seed-2-0-pro-260215"
  timeout_seconds: 30


rules:
  # 识别拒答的关键词，可按需扩展
  refusal_keywords:
    - "无法回答"
    - "不能回答"
    - "不方便回答"
    - "对不起"
    - "抱歉"
    - "作为 AI"
  # 识别可能的"幻觉"表述关键词，可按需扩展
  hallucination_keywords:
    - "纯属虚构"
    - "我编造了"
    - "捏造的"
  # 从预期结果中提取 must_mention 关键词时，允许的最小片段长度
  must_mention_min_length: 2


noise:
  enabled: true
  # 用于 D04 等场景生成噪声对话的主题库，可根据实际评估需求自定义
  topics:
    - "今天天气不错，你那边怎么样？"
    - "最近在追一部电视剧，剧情特别精彩。"
    - "周末打算去公园散步放松一下。"
